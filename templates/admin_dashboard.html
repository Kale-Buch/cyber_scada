<!DOCTYPE html>
<html>
<head>
    <title>Device Manager</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        button {
            padding: 5px 10px;
        }
    </style>
</head>
<script>

async function loadDevices() {

    const response = await fetch('/admin/devices');
    const devices = await response.json();

    const table = document.getElementById('deviceTable');

    table.innerHTML = '';

    devices.forEach(device => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${device.ip}</td>

            <td>
                <div>
                    Connection:
                    ${
                        device.connected
                        ? '<span style="color:lime">Connected</span>'
                        : '<span style="color:red">Disconnected</span>'
                    }
                </div>

                <div>
                    Access:
                    ${
                        device.soft_blocked
                        ? '<span style="color:orange">Soft Blocked</span>'
                        : '<span style="color:green">Not Blocked</span>'
                    }
                </div>
            </td>

            <td>
                ${
                    device.connected
                    ? `<button onclick="disconnectDevice('${device.ip}')">Disconnect</button>`
                    : `<button onclick="connectDevice('${device.ip}')">Connect</button>`
                }
            </td>

            <td>
                ${
                    device.soft_blocked
                    ? `<button onclick="unsoftBlock('${device.ip}')">Unsoft Block</button>`
                    : `<button onclick="softBlock('${device.ip}')">Soft Block</button>`
                }
            </td>
        `;

        table.appendChild(row);
    });
}

async function disconnectDevice(ip) {

    await fetch(`/admin/disconnect/${ip}`, {
        method: 'POST'
    });

    loadDevices();
}

async function connectDevice(ip) {

    await fetch(`/admin/connect/${ip}`, {
        method: 'POST'
    });

    loadDevices();
}

loadDevices();

setInterval(loadDevices, 2000);

</script>
<body>

<h1>Connected Devices</h1>

<table>
    <tr>
        <th>IP Address</th>
        <th>Status</th>
        <th>Connection</th>
        <th>Block</th> 
    </tr>
    <tbody id="deviceTable">
    </tbody>
</table>

<script>
async function disconnectDevice(id) {
    await fetch(`/admin/disconnect/${id}`, {
        method: 'POST'
    });

    location.reload();
}

async function connectDevice(id) {
    await fetch(`/admin/connect/${id}`, {
        method: 'POST'
    });

    location.reload();
}

async function softBlock(ip) {

    await fetch(`/admin/soft-block/${ip}`, {
        method: 'POST'
    });

    loadDevices();
}

async function unsoftBlock(ip) {

    await fetch(`/admin/unsoft-block/${ip}`, {
        method: 'POST'
    });

    loadDevices();
}
</script>

</body>
</html>
